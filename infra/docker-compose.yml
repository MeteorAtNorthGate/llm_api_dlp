services:
  postgres:
    image: postgres:17-alpine
    container_name: llm-dlp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: llm_dlp
      POSTGRES_USER: llmuser
      POSTGRES_PASSWORD: llmpass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U llmuser -d llm_dlp"]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.3
    container_name: llm-dlp-keycloak
    restart: unless-stopped
    command:
      - start-dev
      - --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: llmuser
      KC_DB_PASSWORD: llmpass
      KC_HOSTNAME: localhost
      KC_HTTP_PORT: 8080
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak/llm-dlp-realm.json:/opt/keycloak/data/import/llm-dlp-realm.json:ro
    depends_on:
      postgres:
        condition: service_healthy

  keycloak-setup:
    image: python:3.14-slim
    container_name: llm-dlp-keycloak-setup
    restart: "no"
    entrypoint: ["/bin/sh", "-c", "apk add --no-cache curl && /scripts/setup-ldap.sh"]
    environment:
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KEYCLOAK_REALM: llm-dlp
      # LDAP / Active Directory (optional)
      LDAP_ENABLED: ${LDAP_ENABLED:-false}
      LDAP_URL: ${LDAP_URL:-}
      LDAP_BIND_DN: ${LDAP_BIND_DN:-}
      LDAP_BIND_CREDENTIALS: ${LDAP_BIND_CREDENTIALS:-}
      LDAP_USERS_DN: ${LDAP_USERS_DN:-}
      LDAP_VENDOR: ${LDAP_VENDOR:-ad}
    volumes:
      - ./keycloak/setup-ldap.sh:/scripts/setup-ldap.sh:ro
    depends_on:
      keycloak:
        condition: service_started

  litellm:
    image: ghcr.io/berriai/litellm:v1.87.1
    container_name: llm-dlp-litellm
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://llmuser:llmpass@postgres:5432/litellm
      LITELLM_MASTER_KEY: sk-master-key-change-me
      LITELLM_SALT_KEY: salt-key-change-me
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      STORE_MODEL_IN_DB: "true"
      SERVER_ROOT_PATH: ""
    ports:
      - "4000:4000"
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - --config
      - /app/config.yaml

  minio:
    image: quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: llm-dlp-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  api-server:
    build:
      context: ../apps/api-server
      dockerfile: Dockerfile
    image: llm-dlp-api:latest
    container_name: llm-dlp-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://llmuser:llmpass@postgres:5432/llm_dlp
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: llm-dlp
      KEYCLOAK_CLIENT_ID: llm-dlp-web
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-change-me}
      LITELLM_BASE_URL: http://litellm:4000
      LITELLM_MASTER_KEY: sk-master-key-change-me
      LITELLM_DATABASE_URL: postgresql+asyncpg://llmuser:llmpass@postgres:5432/litellm
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: llm-dlp-files
      MINIO_SECURE: "false"
      MAX_FILE_SIZE_MB: "20"
      APP_SECRET_KEY: ${APP_SECRET_KEY:-dev-secret-key-change-me}
      APP_LOG_LEVEL: DEBUG
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      keycloak:
        condition: service_started
      litellm:
        condition: service_started

  web-client:
    build:
      context: ../apps/web-client
      dockerfile: Dockerfile
    image: llm-dlp-web:latest
    container_name: llm-dlp-web
    restart: unless-stopped
    depends_on:
      - api-server

volumes:
  pgdata:
  minio_data:
