model_list:
  - model_name: deepseek-v4-flash
    litellm_params:
      model: deepseek/deepseek-v4-flash
      api_base: https://api.deepseek.com
      api_key: ${DEEPSEEK_API_KEY}
      rpm: 500
      tpm: 100000

general_settings:
  master_key: sk-master-key-change-me
  database_url: postgresql://llmuser:llmpass@postgres:5432/litellm

litellm_settings:
  # callbacks are disabled until DLP plugin is mounted into container
  # callbacks:
  #   - custom_logger
  drop_params: true
  set_verbose: false

router_settings:
  routing_strategy: "usage-based-routing-v2"
  enable_pre_call_checks: true
  allowed_fails: 3
  num_retries: 2
  cooldown_time: 30
