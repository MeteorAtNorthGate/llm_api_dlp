# model_list is empty — all models are managed dynamically via the admin UI
# (stored in LiteLLM DB). On first startup, the api-server seeds the default
# model via LiteLLM's /model/new API so it is editable/deletable.
model_list: []

general_settings:
  # 以下两项由环境变量注入（docker-compose 负责设置），
  # 不要在 YAML 中硬编码真实密码 —— config.yaml 仅作为模板参考。
  #   本地开发默认值:   DATABASE_URL=postgresql://llmuser:llmpass@postgres:5432/litellm
  #                     LITELLM_MASTER_KEY=sk-master-key-change-me
  #   云端部署覆盖方式:  cp .env.cloud.example .env.cloud → 修改强密码 → deploy
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL

litellm_settings:
  # callbacks are disabled until DLP plugin is mounted into container
  # callbacks:
  #   - custom_logger
  drop_params: true
  set_verbose: false

router_settings:
  routing_strategy: "usage-based-routing-v2"
  enable_pre_call_checks: true
  allowed_fails: 3
  num_retries: 2
  cooldown_time: 30
