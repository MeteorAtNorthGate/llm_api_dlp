# 云端部署 compose —— 配合 jc21/nginx-proxy-manager 使用
# 部署步骤:
#   1. 本地构建:  make build-cloud
#   2. 上传:      scp infra/images.tar.gz infra/docker-compose.cloud.yml infra/.env.cloud user@host:/home/devuser/projects/LLM_API/
#   3. 上传配置:  scp -r infra/keycloak/ infra/litellm/ user@host:/home/devuser/projects/LLM_API/infra/
#   4. 云端加载:  ssh user@host "cd /home/devuser/projects/LLM_API && docker load -i infra/images.tar.gz"
#   5. 云端启动:  ssh user@host "cd /home/devuser/projects/LLM_API && docker compose -f infra/docker-compose.cloud.yml --env-file infra/.env.cloud up -d"
#   6. Keycloak:  登录 admin 控制台，将云端域名加入 llm-dlp-web 客户端的 redirectUris / webOrigins
#
# NPM 反代配置:
#   Scheme: http  →  Forward Hostname: llm-dlp-web  →  Forward Port: 80
#
# ⚠️ 首次部署后务必更新 Keycloak 客户端重定向 URI:
#   当前 llm-dlp-realm.json 里只包含 localhost，云端需要添加:
#     redirectUris:        https://<your-domain>/*, https://<your-domain>/auth/callback
#     webOrigins:          https://<your-domain>
#     postLogoutRedirectUris: https://<your-domain>

services:
  postgres:
    image: postgres:17-alpine
    container_name: llm-dlp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: llm_dlp
      POSTGRES_USER: llmuser
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-llmpass}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U llmuser -d llm_dlp"]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.3
    container_name: llm-dlp-keycloak
    restart: unless-stopped
    command:
      - start-dev
      - --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: llmuser
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-llmpass}
      KC_HOSTNAME: ${KEYCLOAK_HOSTNAME:-localhost}
      KC_HTTP_PORT: 8080
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    volumes:
      - ./keycloak/llm-dlp-realm.json:/opt/keycloak/data/import/llm-dlp-realm.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - default
      - nginx-proxy-manager_default

  keycloak-setup:
    image: python:3.14-slim
    container_name: llm-dlp-keycloak-setup
    restart: "no"
    entrypoint: ["/bin/sh", "-c", "apk add --no-cache curl && /scripts/setup-ldap.sh"]
    environment:
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-llm-dlp}
      # LDAP / Active Directory
      LDAP_ENABLED: ${LDAP_ENABLED:-false}
      LDAP_URL: ${LDAP_URL:-}
      LDAP_BIND_DN: ${LDAP_BIND_DN:-}
      LDAP_BIND_CREDENTIALS: ${LDAP_BIND_CREDENTIALS:-}
      LDAP_USERS_DN: ${LDAP_USERS_DN:-}
      LDAP_VENDOR: ${LDAP_VENDOR:-ad}
    volumes:
      - ./keycloak/setup-ldap.sh:/scripts/setup-ldap.sh:ro
    depends_on:
      keycloak:
        condition: service_started

  litellm:
    image: ghcr.io/berriai/litellm:v1.87.1
    container_name: llm-dlp-litellm
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://llmuser:${POSTGRES_PASSWORD:-llmpass}@postgres:5432/litellm
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-master-key-change-me}
      LITELLM_SALT_KEY: ${LITELLM_SALT_KEY:-salt-key-change-me}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      STORE_MODEL_IN_DB: "true"
      SERVER_ROOT_PATH: ""
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    networks:
      - default
      - nginx-proxy-manager_default
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - --config
      - /app/config.yaml

  minio:
    image: quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: llm-dlp-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  api-server:
    image: llm-dlp-api:latest
    container_name: llm-dlp-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://llmuser:${POSTGRES_PASSWORD:-llmpass}@postgres:5432/llm_dlp
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-llm-dlp}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-llm-dlp-web}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      LITELLM_BASE_URL: http://litellm:4000
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-master-key-change-me}
      LITELLM_DATABASE_URL: postgresql+asyncpg://llmuser:${POSTGRES_PASSWORD:-llmpass}@postgres:5432/litellm
      LITELLM_PUBLIC_URL: ${LITELLM_PUBLIC_URL:-http://localhost:4000}
      APP_SECRET_KEY: ${APP_SECRET_KEY}
      APP_LOG_LEVEL: ${APP_LOG_LEVEL:-INFO}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-llm-dlp-files}
      MINIO_SECURE: "false"
      MAX_FILE_SIZE_MB: "20"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      keycloak:
        condition: service_started
      litellm:
        condition: service_started

  web-client:
    image: llm-dlp-web:latest
    container_name: llm-dlp-web
    restart: unless-stopped
    networks:
      - default
      - nginx-proxy-manager_default
    depends_on:
      - api-server

volumes:
  pgdata:
  minio_data:

networks:
  nginx-proxy-manager_default:
    external: true
