server {
    listen 80;
    server_name localhost;

    client_max_body_size 25M;

    root /usr/share/nginx/html;
    index index.html;

    # API 反代：保持原来的逻辑
    # 用 ^~ 防止 /api/xxx.js 之类路径被静态资源规则误匹配
    location ^~ /api/ {
        proxy_pass http://api-server:8000;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 3600s;
        proxy_buffering off;

        # API 一般不要被浏览器/代理缓存
        add_header Cache-Control "no-store" always;
    }

    # 根路径：返回 index.html，不缓存
    location = / {
        try_files /index.html =404;
        add_header Cache-Control "no-store" always;
    }

    # 入口 HTML：绝对不要强缓存
    # 这是解决“部署后还是旧页面”的关键
    location = /index.html {
        try_files /index.html =404;
        add_header Cache-Control "no-store" always;
    }

    # Vite 构建出来的 hash 静态资源
    # 例如 /assets/index-Bk91x8sd.js
    # 文件内容变化时文件名会变化，所以可以长期缓存
    location ^~ /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        access_log off;
    }

    # public/ 目录原样复制出来的资源
    # 比如 /favicon.svg、/robots.txt、/manifest.webmanifest
    # 这些文件名通常不带 hash，不要缓存太久
    location ~* \.(?:svg|ico|png|jpg|jpeg|gif|webp|avif|txt|xml|webmanifest|json)$ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=3600, must-revalidate" always;
        access_log off;
    }

    # SPA 前端路由
    # /chat、/admin、/usage 等路径 fallback 到 index.html
    # 也必须不缓存，否则前端入口可能还是旧版本
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store" always;
    }
}